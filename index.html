<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Go In Pro Construction · Links</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Fraunces:opsz,wght@9..144,400;9..144,500&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #111111;
    --ink-soft: #1a1a1a;
    --muted: #6b6b6b;
    --hair: #e8e8e6;
    --hair-strong: #d8d8d4;
    --paper: #fafaf7;
    --paper-card: #ffffff;
    --red: #B91C1C;
    --gold: #B8902C;
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    padding: 0;
    background: var(--paper);
    color: var(--ink);
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    min-height: 100vh;
  }

  .page {
    min-height: 100vh;
    display: flex;
    align-items: flex-start;
    justify-content: center;
    padding: 48px 20px 32px;
  }

  .card {
    width: 100%;
    max-width: 380px;
    display: flex;
    flex-direction: column;
    align-items: stretch;
  }

  /* ——— Header ——— */
  .header {
    text-align: center;
    padding: 8px 8px 32px;
  }

  .logo {
    display: block;
    width: 100%;
    max-width: 260px;
    height: auto;
    margin: 0 auto;
  }

  .rule {
    width: 24px;
    height: 1px;
    background: var(--hair-strong);
    margin: 26px auto 20px;
    border: 0;
  }

  .tagline {
    font-family: 'Fraunces', Georgia, serif;
    font-weight: 400;
    font-size: 16px;
    line-height: 1.4;
    color: var(--ink-soft);
    margin: 0 auto;
    max-width: 280px;
    font-style: italic;
  }

  /* ——— Links ——— */
  .links {
    display: flex;
    flex-direction: column;
    gap: 10px;
    padding: 0;
  }

  .link {
    position: relative;
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 18px 20px;
    background: var(--paper-card);
    border: 1px solid var(--hair);
    border-radius: 14px;
    text-decoration: none;
    color: var(--ink);
    font-size: 14px;
    font-weight: 500;
    letter-spacing: -0.005em;
    transition: transform .18s ease, border-color .18s ease, background-color .18s ease, box-shadow .18s ease;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
  }

  .link:hover {
    border-color: var(--ink);
    transform: translateY(-1px);
    box-shadow: 0 6px 18px -10px rgba(0,0,0,0.18);
  }

  .link:active { transform: translateY(0); }

  .link:focus-visible {
    outline: 2px solid var(--gold);
    outline-offset: 2px;
  }

  .link .icon {
    width: 20px;
    height: 20px;
    flex-shrink: 0;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    color: var(--ink);
  }

  .link .icon svg {
    width: 100%;
    height: 100%;
  }

  .link .label {
    flex: 1;
  }

  .link .arrow {
    width: 14px;
    height: 14px;
    flex-shrink: 0;
    color: var(--muted);
    transition: transform .18s ease, color .18s ease;
  }

  .link:hover .arrow {
    transform: translateX(3px);
    color: var(--ink);
  }

  /* Primary (filled) variant for the main CTA */
  .link.primary {
    background: var(--ink);
    border-color: var(--ink);
    color: #fff;
  }

  .link.primary .icon,
  .link.primary .arrow {
    color: #fff;
  }

  .link.primary:hover {
    background: #000;
    box-shadow: 0 8px 22px -10px rgba(0,0,0,0.5);
  }

  .link.primary .sub {
    display: block;
    font-size: 11px;
    font-weight: 400;
    letter-spacing: 0.04em;
    color: rgba(255,255,255,0.6);
    margin-top: 2px;
  }

  /* Footer */
  .footer {
    margin-top: 36px;
    text-align: center;
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.04em;
    line-height: 1.6;
  }

  .footer .accent {
    color: var(--gold);
    margin: 0 6px;
  }

  .footer .row + .row {
    margin-top: 4px;
  }
</style>
</head>
